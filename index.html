<!DOCTYPE html>
<html>
    
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />

        <!-- Disable zooming -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
        
        <title>Game Bricked - A Game Boy Emulator for Desktop and Web</title>


        <!-- Basic SEO -->
        <meta name="description" content="A Game Boy emulator made with love brick by brick.">

        <!-- Open Graph -->
        <meta property="og:title" content="Game Bricked">
        <meta property="og:description" content="A Game Boy emulator made with love brick by brick">
        <meta property="og:image" content="https://NoelleStern.github.io/GameBricked/assets/previews/preview-opengraph.png">
        <meta property="og:url" content="https://NoelleStern.github.io/">
        <meta property="og:type" content="website">
        <meta property="og:site_name" content="Noelle's dwelling">

        <!-- Twitter Card -->
        <meta name="twitter:card" content="summary_large_image">
        <meta name="twitter:title" content="Game Bricked">
        <meta name="twitter:description" content="A Game Boy emulator made with love brick by brick">
        <meta name="twitter:image" content="https://NoelleStern.github.io/GameBricked/assets/previews/preview-twitter.png">
        <meta name="twitter:site" content="@NoelleSternchen">


        <!-- Config for our rust wasm binary. Go to https://trunkrs.dev/assets/#rust for more customization -->
        <link data-trunk rel="rust" data-wasm-opt="2" />
        <!-- This is the base url relative to which other urls will be constructed. Trunk will insert this from the public-url option -->
        <base data-trunk-public-url />

        <link data-trunk rel="icon" href="assets/website/favicon.ico">

        <!-- Public folder vite style -->
        <link data-trunk rel="copy-dir" href="assets/website/public" data-target-path="assets"/>
        <!-- Other files -->
        <link data-trunk rel="copy-file" href="assets/website/sw.js"/>
        <link data-trunk rel="copy-file" href="assets/website/manifest.json"/>
        <link data-trunk rel="copy-file" href="assets/website/favicon-192x192.png" data-target-path="assets/website"/>
        <link data-trunk rel="copy-file" href="assets/website/favicon-512x512.png" data-target-path="assets/website"/>
        <link data-trunk rel="copy-file" href="assets/website/apple-touch-icon.png" data-target-path="assets/website"/>


        <link rel="manifest" href="manifest.json">
        <link rel="apple-touch-icon" href="assets/website/apple-touch-icon.png">
        <meta name="theme-color" media="(prefers-color-scheme: light)" content="white">
        <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#404040">

        <style>
            html {
                /* Remove touch delay */
                touch-action: manipulation;
            }

            body {
                /* Light mode background color for what is not covered by the egui canvas, or where the egui canvas is translucent */
                background: #eff1f5;
            }

            @media (prefers-color-scheme: dark) {
                body {
                    /* Dark mode background color for what is not covered by the egui canvas, or where the egui canvas is translucent */
                    background: #303446;
                }
            }

            /* Allow canvas to fill entire web page */
            html, body {
                overflow: hidden;
                margin: 0 !important;
                padding: 0 !important;
                height: 100%;
                width: 100%;
            }

            /* Make canvas fill entire document */
            canvas {
                margin-right: auto;
                margin-left: auto;
                display: block;
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
            }

            .centered {
                margin-right: auto;
                margin-left: auto;
                display: block;
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                color: #f0f0f0;
                font-size: 24px;
                font-family: Ubuntu-Light, Helvetica, sans-serif;
                text-align: center;
            }

            /* ---------------------------------------------- */
            /* Loading animation from https://loading.io/css/ */
            /* ---------------------------------------------- */
            .lds-heart {
                color: #eb4343
            }
            .lds-heart,
            .lds-heart div,
            .lds-heart div:after,
            .lds-heart div:before {
                box-sizing: border-box;
            }
            .lds-heart {
                display: inline-block;
                position: relative;
                width: 80px;
                height: 80px;
                transform: rotate(45deg);
                transform-origin: 40px 40px;
            }
            .lds-heart div {
                top: 28px;
                left: 28px;
                position: absolute;
                width: 32px;
                height: 32px;
                background: currentColor;
                animation: lds-heart 1.2s infinite cubic-bezier(0.215, 0.61, 0.355, 1);
            }
            .lds-heart div:after,
            .lds-heart div:before {
                content: " ";
                position: absolute;
                display: block;
                width: 32px;
                height: 32px;
                background: currentColor;
            }
            .lds-heart div:before {
                left: -24px;
                border-radius: 50% 0 0 50%;
            }
            .lds-heart div:after {
                top: -24px;
                border-radius: 50% 50% 0 0;
            }
            @keyframes lds-heart {
                0%      { transform: scale(0.95); }
                5%      { transform: scale(1.1);  }
                39%     { transform: scale(0.85); }
                45%     { transform: scale(1);    }
                60%     { transform: scale(0.95); }
                100%    { transform: scale(0.9);  }
            }
        </style>
    </head>

    <body>
        <!-- The WASM code will resize the canvas dynamically -->
        <canvas id="game_canvas"></canvas>

        <!-- The loading spinner is be removed by main.rs -->
        <div class="centered" id="loading_text">
            <noscript>You need javascript to use this website</noscript>
            <div class="lds-heart"><div></div></div>
        </div>

        <!-- Register Service Worker. this will cache the wasm / js scripts for offline use (for PWA functionality) -->
        <!-- Force refresh (Ctrl + F5) to load the latest files instead of cached files -->
        <script>
            // We disable caching during development so that we always view the latest version
            if ('serviceWorker' in navigator
                && window.location.hash !== "#dev"
                && window.location.hostname !== 'localhost'
                && window.location.hostname !== '127.0.0.1') {

                window.addEventListener('load', function () {
                    navigator.serviceWorker.register('sw.js');
                });
                
            }
        </script>
    </body>

</html>
